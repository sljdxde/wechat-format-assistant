<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微信排版助手 — Markdown 转微信公众号排版</title>
  <meta name="description" content="将 Markdown 文档一键转换为微信公众号排版格式，支持多种精美主题，复制即可粘贴到微信编辑器。">
  <meta name="keywords" content="微信排版,Markdown,公众号,排版助手,格式转换">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✍️</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <!-- Word 文件解析 -->
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
  <!-- PDF 文件解析 -->
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
</head>
<body>

  <!-- Toast 通知 -->
  <div id="toast-container"></div>

  <!-- 顶部导航 -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <span class="logo-icon">✍️</span>
        <div class="logo-text">
          <h1>微信排版助手</h1>
          <span class="logo-subtitle">Markdown → 微信公众号</span>
        </div>
      </div>
    </div>
    <div class="header-right">
      <div class="theme-selector">
        <span class="theme-label">主题</span>
        <div class="theme-chips" id="theme-chips">
          <!-- JS 动态填充 -->
        </div>
      </div>
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="main-container">
    <!-- 编辑器面板 -->
    <section class="panel editor-panel">
      <div class="panel-header">
        <div class="panel-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          <span>Markdown 编辑器</span>
        </div>
        <div class="panel-actions">
          <button class="icon-btn" id="upload-btn" title="上传 .md 文件">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span>上传</span>
          </button>
          <button class="icon-btn" id="feishu-btn" title="导入飞书公开文档">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            <span>飞书</span>
          </button>
          <button class="icon-btn" id="sample-btn" title="加载示例">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            <span>示例</span>
          </button>
          <button class="icon-btn" id="clear-btn" title="清空内容">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            <span>清空</span>
          </button>
        </div>
      </div>
      <div class="editor-wrapper" id="drop-zone">
        <textarea
          id="markdown-input"
          placeholder="在此粘贴或输入 Markdown 内容...&#10;&#10;支持拖拽 .md / .docx / .pdf 文件到这里 📄"
          spellcheck="false"
        ></textarea>
        <!-- 文件解析中遮罩 -->
        <div class="loading-overlay" id="loading-overlay">
          <div class="loading-content">
            <div class="loading-spinner"></div>
            <span id="loading-text">正在解析文件...</span>
          </div>
        </div>
        <div class="drop-overlay" id="drop-overlay">
          <div class="drop-overlay-content">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span>松开鼠标上传文件</span>
          </div>
        </div>
      </div>
      <div class="editor-footer">
        <span id="char-count">0 字符</span>
        <input type="file" id="file-input" accept=".md,.markdown,.txt,.text,.docx,.pdf" hidden>
      </div>
    </section>

    <!-- 分隔拖拽条 -->
    <div class="divider" id="panel-divider">
      <div class="divider-handle"></div>
    </div>

    <!-- 预览面板 -->
    <section class="panel preview-panel">
      <div class="panel-header">
        <div class="panel-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <span>预览效果</span>
        </div>
        <div class="panel-actions">
          <button class="icon-btn" id="copy-html-btn" title="复制 HTML 源码">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            <span>源码</span>
          </button>
        </div>
      </div>
      <div class="preview-wrapper">
        <div id="preview-content">
          <div class="preview-placeholder">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <p>在左侧输入 Markdown 内容</p>
            <p class="preview-placeholder-sub">实时预览排版效果</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- 底部操作栏 -->
  <footer class="footer-bar">
    <button class="btn-copy" id="copy-rich-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      <span>复制到微信</span>
    </button>
  </footer>

  <!-- 飞书解析弹窗 -->
  <div class="modal-overlay" id="feishu-modal">
    <div class="modal-content">
      <h3 class="modal-title">导入飞书公开文档</h3>
      <p class="modal-desc">请确保云文档权限已设置为“获得链接的人可阅读”</p>
      <input type="text" id="feishu-url-input" class="modal-input" placeholder="输入飞书文档链接 (https://...)">
      <div class="modal-actions">
        <button class="btn-cancel" id="feishu-cancel-btn">取消</button>
        <button class="btn-confirm" id="feishu-confirm-btn">确定导入</button>
      </div>
    </div>
  </div>

  <script src="js/themes.js?v=4"></script>
  <script src="js/converter.js?v=4"></script>
  <script src="js/app.js?v=4"></script>
</body>
</html>
